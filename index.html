<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Speech Racer - ESL Game</title>
    <style>
        :root {
            --city-blue: #a0d8ef;
            --road-grey: #444;
            --grass-green: #7cfc00;
            --accent-yellow: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--city-blue);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Game Container */
        #game-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            position: relative;
            background: linear-gradient(to bottom, #87CEEB 60%, #7cfc00 60%, #7cfc00 70%, var(--road-grey) 70%);
            border: 4px solid #333;
            overflow: hidden;
        }

        /* UI Elements */
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 4px 0 #ccc;
        }

        #progress-container {
            position: absolute;
            top: 80px;
            width: 80%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            left: 10%;
            border: 2px solid #333;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-yellow);
            border-radius: 8px;
            transition: width 0.5s;
        }

        /* World Elements */
        .city-background {
            position: absolute;
            bottom: 30%;
            width: 200%;
            height: 100px;
            display: flex;
            gap: 50px;
            animation: moveCity 20s linear infinite paused;
        }

        .building {
            width: 60px;
            height: 100px;
            background: #ff6b6b;
            border: 2px solid #333;
        }

        /* The Car */
        #car {
            position: absolute;
            bottom: 12%;
            left: 100px;
            font-size: 50px;
            transition: transform 0.5s;
            z-index: 5;
        }

        .crash-anim {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Obstacle */
        #obstacle {
            position: absolute;
            bottom: 12%;
            right: 150px;
            font-size: 60px;
            display: block;
        }

        /* Interaction Panel */
        #interaction-panel {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 100;
        }

        #sentence-display {
            background: white;
            padding: 20px;
            margin: 0 auto 20px;
            width: 80%;
            border-radius: 10px;
            font-size: 1.5rem;
            min-height: 2rem;
            border: 3px solid var(--road-grey);
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.1s;
            box-shadow: 0 5px 0 #555;
        }

        .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #555; }

        #mic-btn { background: #ff4757; color: white; }
        #next-btn { background: #2ed573; color: white; display: none; }
        #retry-btn { background: #ffa502; color: white; display: none; }

        #feedback-msg {
            font-weight: bold;
            margin-top: 10px;
            height: 24px;
            color: #333;
        }

        /* Animations */
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-10deg); }
            20%, 80% { transform: translate3d(2px, 0, 0) rotate(10deg); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-20deg); }
            40%, 60% { transform: translate3d(4px, 0, 0) rotate(20deg); }
        }

        /* Screens */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="stat-box">Level: <span id="lvl-num">1</span> / 8</div>
        <div class="stat-box">Score: <span id="score-num">0</span></div>
    </div>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="car">🚗</div>
    <div id="obstacle">🚧</div>

    <div id="interaction-panel">
        <div id="sentence-display">Click the Mic to Start!</div>
        <div id="feedback-msg"></div>
        <button id="mic-btn" class="btn">🎤 Hold to Speak</button>
        <button id="next-btn" class="btn">Next Level ➔</button>
        <button id="retry-btn" class="btn">Try Again</button>
    </div>

    <div id="game-over" class="modal">
        <h1>🏙️ City Tour Complete!</h1>
        <p id="final-score-text"></p>
        <button class="btn" onclick="location.reload()" style="background: var(--accent-yellow); color: #333;">Play Again</button>
    </div>
</div>

<script>
    const sentences = [
        "There is a shopping mall.",
        "There is a quiet library.",
        "There is a big park.",
        "There is a popular restaurant in the town.",
        "There are many schools in the city.",
        "There are some libraries near the park.",
        "There is a modern shopping mall and it is very interesting.",
        "There are many places in my town and it is very exciting."
    ];

    let currentLevel = 0;
    let score = 0;
    let recognition;
    let startTime;

    // Audio Elements (Synthesized)
    const successSound = new Audio('https://actions.google.com/sounds/v1/cartoon/clime_up.ogg');
    const crashSound = new Audio('https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_accent.ogg');

    const car = document.getElementById('car');
    const sentenceDisplay = document.getElementById('sentence-display');
    const micBtn = document.getElementById('mic-btn');
    const nextBtn = document.getElementById('next-btn');
    const retryBtn = document.getElementById('retry-btn');
    const feedbackMsg = document.getElementById('feedback-msg');

    // Initialize Speech Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            startTime = Date.now();
            feedbackMsg.innerText = "Listening...";
            feedbackMsg.style.color = "blue";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            evaluateSpeech(transcript);
        };

        recognition.onerror = () => {
            feedbackMsg.innerText = "Error occurred. Try again.";
        };
    } else {
        alert("Your browser does not support Speech Recognition. Please use Chrome.");
    }

    // Levenshtein distance for fuzzy matching
    function getSimilarity(s1, s2) {
        let longer = s1;
        let shorter = s2;
        if (s1.length < s2.length) { longer = s2; shorter = s1; }
        let longerLength = longer.length;
        if (longerLength == 0) return 1.0;
        return (longerLength - editDistance(longer, shorter)) / parseFloat(longerLength);
    }

    function editDistance(s1, s2) {
        s1 = s1.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"");
        s2 = s2.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"");
        let costs = new Array();
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i == 0) costs[j] = j;
                else {
                    if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) != s2.charAt(j - 1))
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }

    function evaluateSpeech(spoken) {
        const duration = (Date.now() - startTime) / 1000;
        const target = sentences[currentLevel];
        const similarity = getSimilarity(spoken, target);

        // Noise/Short speech handling
        if (duration < 1.5) {
            feedbackMsg.innerText = "Please speak clearly and try again.";
            feedbackMsg.style.color = "orange";
            return;
        }

        if (similarity > 0.8) {
            handleSuccess();
        } else {
            handleFailure();
        }
    }

    function handleSuccess() {
        score += 10;
        document.getElementById('score-num').innerText = score;
        feedbackMsg.innerText = "Correct! +10 points";
        feedbackMsg.style.color = "green";
        successSound.play();
        
        // Animation: Car passes obstacle
        car.style.transform = "translateX(400px)";
        micBtn.style.display = "none";
        nextBtn.style.display = "inline-block";
    }

    function handleFailure() {
        feedbackMsg.innerText = "Try again";
        feedbackMsg.style.color = "red";
        crashSound.play();
        
        // Animation: Crash
        car.classList.add('crash-anim');
        setTimeout(() => car.classList.remove('crash-anim'), 500);
        
        micBtn.style.display = "none";
        retryBtn.style.display = "inline-block";
    }

    function initLevel() {
        if (currentLevel >= sentences.length) {
            showGameOver();
            return;
        }
        
        // Reset Positions
        car.style.transform = "translateX(0px)";
        micBtn.style.display = "inline-block";
        nextBtn.style.display = "none";
        retryBtn.style.display = "none";
        feedbackMsg.innerText = "";
        
        // Update UI
        document.getElementById('lvl-num').innerText = currentLevel + 1;
        sentenceDisplay.innerText = sentences[currentLevel];
        
        // Update Progress Bar
        const prog = ((currentLevel) / sentences.length) * 100;
        document.getElementById('progress-bar').style.width = prog + "%";
    }

    function showGameOver() {
        document.getElementById('game-over').style.display = "flex";
        document.getElementById('final-score-text').innerText = `You earned ${score} points!`;
        document.getElementById('progress-bar').style.width = "100%";
    }

    // Event Listeners
    micBtn.addEventListener('click', () => {
        // Request mic with noise constraints
        navigator.mediaDevices.getUserMedia({
            audio: {
                noiseSuppression: true,
                echoCancellation: true,
                autoGainControl: true
            }
        }).then(() => {
            recognition.start();
        }).catch(err => {
            alert("Microphone access denied.");
        });
    });

    nextBtn.addEventListener('click', () => {
        currentLevel++;
        initLevel();
    });

    retryBtn.addEventListener('click', () => {
        micBtn.style.display = "inline-block";
        retryBtn.style.display = "none";
        feedbackMsg.innerText = "Ready to try again!";
    });

    // Start Game
    window.onload = initLevel;

</script>
</body>
</html>
